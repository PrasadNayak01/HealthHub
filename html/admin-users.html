<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Health Hub Admin</title>
    <link rel="icon" type="image/png" href="../assets/Health Hub Logo - Title.png">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- User Detail Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box large">
            <div class="modal-header">
                <h3 id="modalTitle">User Details</h3>
                <button class="close-modal" onclick="closeUserModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">Loading...</div>
        </div>
    </div>

    <!-- Custom Alert -->
    <div class="custom-alert-overlay" id="customAlert">
        <div class="custom-alert-box">
            <div class="custom-alert-header">
                <div class="custom-alert-icon" id="alertIcon">⚠</div>
                <h3 class="custom-alert-title" id="alertTitle">Alert</h3>
            </div>
            <p class="custom-alert-message" id="alertMessage">Message</p>
            <div class="custom-alert-buttons" id="alertButtons">
                <button class="custom-alert-button primary" onclick="closeAlert()">OK</button>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="logo-icon">
                <img src="../assets/Health Hub Logo - Main.png" alt="">
            </div>
            <span class="logo-text">HEALTH HUB</span>
            <span class="admin-badge">ADMIN</span>
            
        </div>
        <div class="header-actions">
            <button class="btn-logout" onclick="confirmLogout()">Logout</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <ul class="nav-menu">
                <li class="nav-item"><a href="admin-dashboard.html" class="nav-link">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Dashboard</span>
                </a></li>
                <li class="nav-item"><a href="admin-users.html" class="nav-link active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>User Management</span>
                </a></li>
                <li class="nav-item"><a href="admin-analytics.html" class="nav-link">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <span>Analytics & Research</span>
                </a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header-bar">
                <div>
                    <h1>User Management</h1>
                    <p class="subtitle">View, search, and manage all registered users</p>
                </div>
                <div class="header-bar-actions">
                    <button class="btn-export" onclick="exportCurrentView()">Export CSV</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <div class="filter-tabs" id="roleTabs">
                    <button class="tab active" data-role="all" onclick="setRoleFilter('all',this)">All</button>
                    <button class="tab" data-role="patient" onclick="setRoleFilter('patient',this)">Patients</button>
                    <button class="tab" data-role="doctor" onclick="setRoleFilter('doctor',this)">Doctors</button>
                </div>
                <div class="search-input-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="searchInput" placeholder="Search by name, email, or ID…" oninput="debounceSearch()" />
                </div>
            </div>

            <!-- Stats row -->
            <div class="mini-stats" id="miniStats">
                <span id="totalCount">Loading…</span>
            </div>

            <!-- Table -->
            <div class="table-card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th>Details</th>
                                <th>Appointments</th>
                                <th>Registered</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="9" class="loading-row">Loading users…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script src="../js/admin-users.js"></script>
</body>
</html>
