<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Health Hub Logo - Title.png">
    <title>Health Hub - When your health finds perfect harmony.</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <!-- Custom Alert -->
    <div class="custom-alert-overlay" id="customAlert">
        <div class="custom-alert-box">
            <div class="custom-alert-header">
                <div class="custom-alert-icon" id="alertIcon">✓</div>
                <h3 class="custom-alert-title" id="alertTitle">Success</h3>
            </div>
            <p class="custom-alert-message" id="alertMessage">This is a custom alert message.</p>
            <button class="custom-alert-button" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <nav>
        <div class="logo">
            <img src="../assets/Health Hub Logo - Main.png" alt="Health Hub">
        </div>
    </nav>

    <main>
        <div class="left-content">
            <h1>Login</h1>
            <p class="sub-heading">Enter your Health Hub account and stay in harmony with your health.</p>

            <form action="">
                <!-- EMAIL -->
                <div class="input-group">
                    <input type="email" id="email" required autocomplete="off">
                    <label for="email">Email</label>
                </div>
                <!-- PASSWORD -->
                <div class="input-group">
                    <input type="password" id="password" required>
                    <label for="password">Password</label>

                    <span class="toggle-eye">
                        <img src="../assets/eye-hide.png" id="eyeIcon">
                    </span>
                </div>
                <div class="extra-row">
                    <label class="remember">
                        <input type="checkbox" id="remember-me">
                        Remember me
                    </label>

                    <a href="./forgot-password.html" class="forgot">Forgot Password</a>
                </div>

                <input id="submit-btn" type="submit" value="Login">

                <div class="no-account">
                    Don&apos;t have an account? 
                    <a href="./register.html" class="register-link">Sign up</a>
                </div>
            </form>
        </div>

        <div class="right-content">
            <img src="../assets/Login 3D Model.png" alt="Login 3D Model">
        </div>
    </main>
    <script src="../js/login.js"></script>
</body>
</html>
